<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>Hermes Assistant</title>
<!-- ITCSS: Settings -->
<link rel="stylesheet" href="css/settings/variables.css">
<!-- ITCSS: Generic -->
<link rel="stylesheet" href="css/generic/reset.css">
<!-- ITCSS: Components -->
<link rel="stylesheet" href="css/components/topbar.css">
<link rel="stylesheet" href="css/components/sidebar.css">
<link rel="stylesheet" href="css/components/tab-nav.css">
<link rel="stylesheet" href="css/components/stat-card.css">
<link rel="stylesheet" href="css/components/status-panel.css">
<link rel="stylesheet" href="css/components/sessions.css">
<link rel="stylesheet" href="css/components/job-card.css">
<link rel="stylesheet" href="css/components/badges.css">
<link rel="stylesheet" href="css/components/modal.css">
<link rel="stylesheet" href="css/components/buttons.css">
<link rel="stylesheet" href="css/components/layout.css">
<!-- ITCSS: Utilities -->
<link rel="stylesheet" href="css/utilities/text.css">
</head>
<body>

<aside class="sidebar" id="app-sidebar" aria-label="主导航">
  <button class="sidebar__toggle" id="sidebar-toggle" type="button" aria-label="展开导航" aria-expanded="false" aria-controls="sidebar-nav">
    <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
      <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/>
    </svg>
  </button>
  <nav class="sidebar__nav" id="sidebar-nav" aria-label="Assistant 导航"></nav>
</aside>

<header class="topbar">
  <svg class="topbar__icon" width="28" height="28" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="18" cy="18" r="18" fill="#F97316"/>
    <path d="M18 8L18 11" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <path d="M18 25L18 28" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <path d="M8 18L11 18" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <path d="M25 18L28 18" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <circle cx="18" cy="18" r="6" stroke="white" stroke-width="2"/>
    <circle cx="18" cy="18" r="2" fill="white"/>
    <path d="M12.5 12.5L14 14" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M22 22L23.5 23.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M12.5 23.5L14 22" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M22 14L23.5 12.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </svg>
  <span class="topbar__title">Hermes Assistant</span>
</header>

<main class="main-content">
  <!-- Overview -->
  <div class="tab-content active" id="tab-overview">
    <div class="stats-bar" id="overview-stats"></div>
    <div class="status-grid" id="status-grid"></div>
  </div>

  <!-- Cron Jobs -->
  <div class="tab-content" id="tab-cron">
    <div class="stats-bar" id="cron-stats"></div>
    <div id="jobs-container"></div>
  </div>

  <!-- Sessions -->
  <div class="tab-content" id="tab-sessions">
    <div class="stats-bar" id="sessions-stats"></div>
    <div class="status-panel">
      <div class="panel-header"><span class="indicator green"></span> Active Sessions</div>
      <div class="panel-body" id="sessions-list" style="padding:0;"></div>
    </div>
    <div class="status-panel" style="margin-top:16px;">
      <div class="panel-header">Inactive Sessions (7d)</div>
      <div class="panel-body" id="sessions-inactive" style="padding:0;"></div>
    </div>
  </div>

  <!-- MCP -->
  <div class="tab-content" id="tab-mcp">
    <div class="status-panel">
      <div class="panel-header">MCP Servers</div>
      <div class="panel-body" id="mcp-list" style="padding:0;"></div>
    </div>
  </div>

  <!-- Skills -->
  <div class="tab-content" id="tab-skills">
    <div class="status-panel">
      <div class="panel-header">Custom Skills</div>
      <div class="panel-body" id="skills-custom" style="padding:0;"></div>
    </div>
    <div class="status-panel" style="margin-top:16px;">
      <div class="panel-header">Other Skills</div>
      <div class="panel-body" id="skills-other" style="padding:0;"></div>
    </div>
  </div>

  <!-- Plugins -->
  <div class="tab-content" id="tab-plugins">
    <div class="status-panel">
      <div class="panel-header">Plugins</div>
      <div class="panel-body" id="plugins-list" style="padding:0;"></div>
    </div>
  </div>

  <div class="last-update" id="last-update"></div>
</main>

<div class="modal-overlay" id="prompt-modal" onclick="closePromptModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span id="prompt-modal-title">Prompt</span>
      <button class="modal-close" onclick="closePromptModal()">&times;</button>
    </div>
    <div class="modal-body" id="prompt-modal-body"></div>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
